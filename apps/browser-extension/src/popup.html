<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GVault</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7f9;
        --surface: #ffffff;
        --ink: #102027;
        --muted: #63727a;
        --border: #d8e2e6;
        --accent: #0f766e;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
      }

      body[data-theme="dark"] {
        color-scheme: dark;
        --bg: #071316;
        --surface: #102027;
        --ink: #eef7f7;
        --muted: #adc4c8;
        --border: #315057;
      }

      body {
        width: 340px;
        margin: 0;
        background: var(--bg);
      }

      button,
      input {
        box-sizing: border-box;
        width: 100%;
        min-height: 36px;
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 7px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 760;
        cursor: pointer;
      }

      input {
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 8px 10px;
        background: var(--surface);
        color: var(--ink);
      }

      .popup {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .brand,
      .links,
      .check {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .links {
        justify-content: space-between;
      }

      .mark {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 8px;
        background: #22c7b8;
        color: #062521;
        font-weight: 900;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
      }

      .muted,
      label span {
        color: var(--muted);
        font-size: 12px;
      }

      .status,
      .card {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
      }

      .status {
        padding: 10px;
        font-weight: 700;
      }

      label,
      .card {
        display: grid;
        gap: 10px;
      }

      label {
        font-weight: 720;
      }

      .card {
        padding: 12px;
      }

      .link-button {
        width: auto;
        min-height: 30px;
        padding: 0;
        background: transparent;
        color: var(--accent);
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 650;
      }

      .check input {
        width: auto;
        min-height: auto;
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="popup">
      <section class="brand">
        <div class="mark" aria-hidden="true">G</div>
        <div>
          <h1>GVault</h1>
          <p class="muted">Self-hosted autofill</p>
        </div>
      </section>

      <p class="status" id="status">Checking page forms...</p>

      <section id="fillChoices" class="card" aria-label="Multiple matching logins" hidden>
        <h2 id="fillChoicesTitle">Choose a login</h2>
        <div id="fillChoicesList"></div>
      </section>

      <section id="savePrompt" class="card" aria-label="Save or update login prompt" hidden>
        <h2 id="savePromptTitle">Save new login?</h2>
        <p id="savePromptText" class="muted"></p>
        <button id="openWebVault" type="button">Open web vault to save</button>
        <button id="dismissSaveLogin" class="link-button" type="button">Not now</button>
      </section>

      <section class="card" aria-label="Manual fill">
        <label>
          <span>Username</span>
          <input id="username" placeholder="Username" autocomplete="username" />
        </label>
        <label>
          <span>Password</span>
          <input id="password" placeholder="Password" type="password" autocomplete="current-password" />
        </label>
        <label class="check">
          <input id="sessionAutofill" type="checkbox" />
          <span>Use for this site during this browser session</span>
        </label>
        <label>
          <span>Session URL match</span>
          <select id="sessionMatchMode">
            <option value="domain">Domain and equivalent domains</option>
            <option value="exact-host">Exact host only</option>
            <option value="url-exact">Exact page URL</option>
            <option value="url-prefix">URL prefix</option>
          </select>
        </label>
        <label>
          <span>Match URL or prefix</span>
          <input id="sessionMatchUrl" placeholder="https://example.com/login" />
        </label>
        <button id="fill" type="button">Fill current page</button>
      </section>

      <section class="card" aria-label="Autofill settings">
        <label class="check">
          <input id="autofillEnabled" type="checkbox" checked />
          <span>Automatically fill matching session logins</span>
        </label>
        <label class="check">
          <input id="fillPromptEnabled" type="checkbox" checked />
          <span>Show fill prompts for matching logins</span>
        </label>
        <label class="check">
          <input id="domainDisabled" type="checkbox" />
          <span id="domainDisabledLabel">Disable automatic fill and save prompts on this site</span>
        </label>
        <p class="muted">Turn off globally, or disable only the current site while keeping manual fill available.</p>
      </section>

      <section class="card" aria-label="Autosave settings">
        <label class="check">
          <input id="autosaveEnabled" type="checkbox" checked />
          <span>Prompt to save or update submitted logins</span>
        </label>
        <p class="muted">Turn off to suppress autosave/update prompts while keeping manual fill available.</p>
      </section>

      <section class="card" aria-label="Server connection">
        <label>
          <span>Server URL</span>
          <input id="serverUrl" value="http://127.0.0.1:8080" />
        </label>
        <div class="links">
          <button id="saveServer" class="link-button" type="button">Save server</button>
          <button id="themeButton" class="link-button" type="button">Dark mode</button>
          <button id="openOptions" class="link-button" type="button">Options</button>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
