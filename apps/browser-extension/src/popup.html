<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GVault</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #102027;
      }

      body {
        width: 340px;
        margin: 0;
        background: #f4f7f9;
      }

      button,
      input {
        box-sizing: border-box;
        width: 100%;
        min-height: 36px;
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 7px;
        background: #0f766e;
        color: #ffffff;
        font-weight: 760;
        cursor: pointer;
      }

      input {
        border: 1px solid #d8e2e6;
        border-radius: 7px;
        padding: 8px 10px;
      }

      .popup {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .mark {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 8px;
        background: #22c7b8;
        color: #062521;
        font-weight: 900;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
      }

      .muted,
      label span {
        color: #63727a;
        font-size: 12px;
      }

      .status {
        border: 1px solid #d8e2e6;
        border-radius: 8px;
        padding: 10px;
        background: #ffffff;
        font-weight: 700;
      }

      label {
        display: grid;
        gap: 5px;
        font-weight: 720;
      }

      .card {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid #d8e2e6;
        border-radius: 8px;
        background: #ffffff;
      }

      .links {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }

      .link-button {
        width: auto;
        min-height: 30px;
        padding: 0;
        background: transparent;
        color: #0f766e;
      }
    </style>
  </head>
  <body>
    <main class="popup">
      <section class="brand">
        <div class="mark" aria-hidden="true">G</div>
        <div>
          <h1>GVault</h1>
          <p class="muted">Self-hosted autofill</p>
        </div>
      </section>

      <p class="status" id="status">Checking page forms...</p>

      <section class="card" aria-label="Manual fill">
        <label>
          <span>Username</span>
          <input id="username" placeholder="Username" autocomplete="username" />
        </label>
        <label>
          <span>Password</span>
          <input id="password" placeholder="Password" type="password" autocomplete="current-password" />
        </label>
        <button id="fill" type="button">Fill current page</button>
      </section>

      <section class="card" aria-label="Server connection">
        <label>
          <span>Server URL</span>
          <input id="serverUrl" value="http://127.0.0.1:8080" />
        </label>
        <div class="links">
          <button id="saveServer" class="link-button" type="button">Save server</button>
          <button id="openOptions" class="link-button" type="button">Options</button>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
