name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality / full gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Install the lockfile-matched Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Route shared browser tests to Playwright Chromium
        run: |
          BROWSER_PATH=$(node --input-type=module -e "import { chromium } from 'playwright'; process.stdout.write(chromium.executablePath())")
          echo "GV_CHROME_EXECUTABLE=$BROWSER_PATH" >> "$GITHUB_ENV"
          echo "GV_CHROME_PATH=$BROWSER_PATH" >> "$GITHUB_ENV"
      - name: Build workspaces
        run: npm run build
      - name: Lint sources
        run: npm run lint
      - name: Run serialized unit and integration tests
        run: npm test
      - name: Smoke-test the server
        run: npm run smoke:server
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Validate build artifacts
        run: node scripts/ci/check-build-artifacts.mjs

  chrome:
    name: Chrome extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GV_CHROME_EXECUTABLE: /usr/bin/google-chrome
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run Chrome extension smoke in an isolated display
        run: xvfb-run --auto-servernum npm run smoke:chrome-extension
      - name: Validate Chrome extension artifact
        run: node scripts/ci/check-build-artifacts.mjs --target chrome

  edge:
    name: Edge extension
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      GV_EDGE_EXECUTABLE: 'C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run Edge extension smoke
        run: npm run smoke:edge-extension
      - name: Validate Edge extension artifact
        run: node scripts/ci/check-build-artifacts.mjs --target edge

  firefox:
    name: Firefox extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GV_FIREFOX_EXECUTABLE: /usr/bin/firefox
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run packaged Firefox extension smoke
        run: npm run smoke:firefox-extension
      - name: Validate Firefox extension artifact
        run: node scripts/ci/check-build-artifacts.mjs --target firefox

  android:
    name: Android APK
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 22
      - name: Install locked dependencies
        run: npm ci
      - name: Build signed preview APK
        run: npm run build:android
      - name: Validate Android artifact
        run: node scripts/ci/check-build-artifacts.mjs --target android
      - name: Retain signed preview APK and certificate evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gvault-android-apk
          path: |
            apps/mobile/dist/gvault-android-v*.apk
            apps/mobile/dist/gvault-android-v*.verify.txt
          if-no-files-found: error
          retention-days: 14
